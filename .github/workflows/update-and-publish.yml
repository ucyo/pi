name: Update versions & publish image

on:
  schedule:
    - cron: "0 4 * * *" # daily at 04:00 UTC
  workflow_dispatch: # allow manual runs

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push Dockerfile changes
      pull-requests: write

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Resolve latest versions
      # ------------------------------------------------------------------ #
      - name: Get latest Node.js LTS version
        id: node
        run: |
          # Fetch the full release list and pick the highest LTS release
          LATEST_LTS=$(curl -fsSL https://nodejs.org/dist/index.json \
            | jq -r '[.[] | select(.lts != false)] | .[0].version')
          # Strip the leading 'v' (e.g. v22.14.0 -> 22.14.0)
          VERSION=$(echo "$LATEST_LTS" | sed 's/^v//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved Node.js LTS version: $VERSION"

      - name: Get latest pi version
        id: pi
        run: |
          VERSION=$(curl -fsSL https://registry.npmjs.org/@mariozechner/pi-coding-agent/latest \
            | jq -r '.version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved pi version: $VERSION"

      # ------------------------------------------------------------------ #
      # 3. Read current ARG values from the Dockerfile
      # ------------------------------------------------------------------ #
      - name: Read current Dockerfile ARG values
        id: current
        run: |
          NODE=$(grep -oP '(?<=ARG NODE_VERSION=)\S+' Dockerfile)
          PI=$(grep -oP '(?<=ARG PI_VERSION=)\S+' Dockerfile)
          echo "node=$NODE" >> "$GITHUB_OUTPUT"
          echo "pi=$PI"     >> "$GITHUB_OUTPUT"
          echo "Current NODE_VERSION=$NODE  PI_VERSION=$PI"

      # ------------------------------------------------------------------ #
      # 4. Decide whether anything changed
      # ------------------------------------------------------------------ #
      - name: Check for updates
        id: changed
        run: |
          NODE_CHANGED=false
          PI_CHANGED=false

          if [ "${{ steps.node.outputs.version }}" != "${{ steps.current.outputs.node }}" ]; then
            NODE_CHANGED=true
            echo "Node.js version changed: ${{ steps.current.outputs.node }} -> ${{ steps.node.outputs.version }}"
          fi

          if [ "${{ steps.pi.outputs.version }}" != "${{ steps.current.outputs.pi }}" ]; then
            PI_CHANGED=true
            echo "pi version changed: ${{ steps.current.outputs.pi }} -> ${{ steps.pi.outputs.version }}"
          fi

          if [ "$NODE_CHANGED" = "true" ] || [ "$PI_CHANGED" = "true" ]; then
            echo "any=true" >> "$GITHUB_OUTPUT"
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "No version changes detected – nothing to do."
          fi

      # ------------------------------------------------------------------ #
      # 5. Patch the Dockerfile (only when something changed)
      # ------------------------------------------------------------------ #
      - name: Update Dockerfile ARG values
        if: steps.changed.outputs.any == 'true'
        run: |
          sed -i \
            "s/ARG NODE_VERSION=.*/ARG NODE_VERSION=${{ steps.node.outputs.version }}/" \
            Dockerfile
          sed -i \
            "s/ARG PI_VERSION=.*/ARG PI_VERSION=${{ steps.pi.outputs.version }}/" \
            Dockerfile

          echo "--- Updated Dockerfile ---"
          grep "ARG " Dockerfile

      # ------------------------------------------------------------------ #
      # 6. Build & push the Docker image
      # ------------------------------------------------------------------ #
      - name: Set up Docker Buildx
        if: steps.changed.outputs.any == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.changed.outputs.any == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker tags
        if: steps.changed.outputs.any == 'true'
        id: tags
        run: |
          PI_VERSION="${{ steps.pi.outputs.version }}"
          NODE_VERSION="${{ steps.node.outputs.version }}"
          
          # Extract major.minor from pi version (e.g., 0.55.3 -> 0.55)
          PI_MAJOR_MINOR=$(echo "$PI_VERSION" | cut -d. -f1,2)
          
          # Generate build date tag (YYYY-MM-DD format)
          BUILD_DATE=$(date -u +%Y-%m-%d)
          
          echo "pi_major_minor=$PI_MAJOR_MINOR" >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: steps.changed.outputs.any == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            NODE_VERSION=${{ steps.node.outputs.version }}
            PI_VERSION=${{ steps.pi.outputs.version }}
          tags: |
            ucyo/pi:latest
            ucyo/pi:${{ steps.pi.outputs.version }}
            ucyo/pi:${{ steps.tags.outputs.pi_major_minor }}
            ucyo/pi:node${{ steps.node.outputs.version }}-pi${{ steps.pi.outputs.version }}
            ucyo/pi:${{ steps.tags.outputs.build_date }}
          labels: |
            org.opencontainers.image.title=pi-coding-agent
            org.opencontainers.image.description=Containerized pi coding agent with Node.js and common tools
            org.opencontainers.image.version=${{ steps.pi.outputs.version }}
            org.opencontainers.image.created=${{ steps.tags.outputs.build_date }}
            org.opencontainers.image.source=https://github.com/ucyo/pi
            pi.version=${{ steps.pi.outputs.version }}
            node.version=${{ steps.node.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ------------------------------------------------------------------ #
      # 7. Commit the updated Dockerfile back to main
      # ------------------------------------------------------------------ #
      - name: Commit updated Dockerfile
        if: steps.changed.outputs.any == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "chore: bump Node ${{ steps.node.outputs.version }}, pi ${{ steps.pi.outputs.version }}"
          git push
